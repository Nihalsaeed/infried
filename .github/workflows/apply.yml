name: apply

on:
  push:
    branches: [main]

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: push and apply
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TINKERSPACE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ tinkerspace@187.127.143.52:/opt/tinkerhub-infra/
          ssh -o StrictHostKeyChecking=no tinkerspace@187.127.143.52 \
            "cd /opt/tinkerhub-infra && sudo bash scripts/apply.sh"
